    <style>
        /* Article styling */
        #main-content-area article {
            flex: 1 1 400px;
            /* grow/shrink, min width 400px */
        }

        /* Optional styling for heading */
        #main-content-area h1 span {
            color: #0ff;
        }

        .card-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            background: #000;
            /* page background */
        }

        /* Holographic card effect */
        .card-row .card {
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            flex: 1 0 calc(50% - 20px);
        }

        @media only screen and (min-width: 768px) {
            #main-content-area .intro {
                display: flex;
                gap: 40px;
            }

            #main-content-area aside img {
                max-width: 300px;
            }

            .card-row .card {
                flex: 1 0 calc(25% - 20px);
            }
        }

        .card-row .card a {
            margin: 10px auto;
            position: relative;
            display: block;
            width: 144px;
            height: 200px;
            /* taller height */
            overflow: hidden;
            border-radius: 15px;
            text-decoration: none;
            color: #0ff;
            /* default text color */
            font-family: sans-serif;
        }

        /* Image fills top portion of card */
        .card-row a img {
            width: 100%;
            height: 70%;
            /* top 70% of card height */
            display: block;
            border-radius: 15px 15px 0 0;
            object-fit: cover;
        }

        /* Text overlay at bottom */
        .card-row a .card-text {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 30%;
            /* bottom 30% of card */
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        /* Text hover effect */
        .card-row a:hover .card-text {
            color: #fff;
            /* changes color on hover */
            font-size: 1.2rem;
            /* slightly expands text */
            font-weight: bold;
        }

        /* Shine overlay */
        .card-row a::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(0deg,
                    transparent,
                    transparent 30%,
                    rgba(0, 255, 255, 0.3));
            transform: rotate(-45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        /* Hover effect */
        .card-row a:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .card-row a:hover::before {
            opacity: 1;
            transform: rotate(-45deg) translateY(100%);
        }
    </style>
</head>
