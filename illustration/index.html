    /* Wrapper for each image + caption */
    .image-wrapper {
      position: relative;
      /* needed for caption positioning */
      width: 100%;
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      display: block;
      object-fit: cover;
      max-height: 400px;

    /* Caption style */
    .caption {
      position: absolute;
      bottom: 8px;
      right: 12px;

      /* semi-transparent background */
      color: #fff;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
